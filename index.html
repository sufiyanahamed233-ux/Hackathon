<!DOCTYPE html>
<html>
<head>
  <title>Crop Health AI</title>

  <style>
    body {
      font-family: Arial;
    }

    #output {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      background: #f5f5f5;
      max-width: 500px;
    }

    #output h3 {
      color: red;
      margin-bottom: 5px;
    }

    #output p {
      margin: 5px 0;
    }

    #output ul {
      margin-top: 5px;
      padding-left: 20px;
    }
  </style>
</head>

<body>

<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<h2>Plant Details</h2>
<input id="crop" placeholder="Crop Name">
<input id="age" placeholder="Plant Age (days)">
<input id="soil" placeholder="Soil Type">

<h3>Upload Image</h3>
<input type="file" id="image">

<button onclick="submitData()">Analyze</button>

<div id="output"></div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
const { createClient } = supabase;

const supabaseClient = createClient(
  "https://cxlblacmmvukdhdwyiap.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN4bGJsYWNtbXZ1a2RoZHd5aWFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjE4MDgsImV4cCI6MjA5MjQ5NzgwOH0.xN0HwP2j6G0f7C5z6_pJXfDzb1-bz9EcViwmDzBiupI"
);

async function login() {
  const { error } = await supabaseClient.auth.signInWithPassword({
    email: document.getElementById("email").value,
    password: document.getElementById("password").value
  });

  alert(error ? error.message : "Logged in!");
}

async function submitData() {
  const file = document.getElementById("image").files[0];

  if (!file) {
    alert("Please select an image!");
    return;
  }

  const { data, error } = await supabaseClient.storage
    .from('plant-images')
    .upload(`/img_${Date.now()}.jpg`, file);

  if (error) {
    alert(error.message);
    return;
  }

  const { data: urlData } = supabaseClient.storage
    .from('plant-images')
    .getPublicUrl(data.path);

  const res = await fetch("https://sufiyanahamed322.app.n8n.cloud/webhook-test/crop-ai", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      crop: document.getElementById("crop").value,
      age: document.getElementById("age").value,
      soil: document.getElementById("soil").value,
      image: urlData.publicUrl
    })
  });

  const text = await res.text();

  let clean = text;
  try {
    const parsed = JSON.parse(text);
    clean = parsed.result;
  } catch {}

  formatOutput(clean);
}

function formatOutput(text) {
  const lines = text.split("\n");

  let html = "<ul>";

  lines.forEach(line => {
    line = line.trim();

    if (line.includes("Disease Detected")) {
      html += `<h3>${line}</h3>`;
    } 
    else if (line.includes("Disease Name") || line.includes("Confidence")) {
      html += `<p><b>${line}</b></p>`;
    } 
    else if (line.includes("Actionable Suggestions")) {
      html += `</ul><h4>💡 Recommendations:</h4><ul>`;
    } 
    else if (line.startsWith("-")) {
      html += `<li>${line.replace("-", "").trim()}</li>`;
    }
  });

  html += "</ul>";

  document.getElementById("output").innerHTML = html;
}
</script>

</body>
</html>
