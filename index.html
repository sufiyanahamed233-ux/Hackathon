<input id="age" placeholder="Plant Age (days)">
<input id="soil" placeholder="Soil Type">

<h3>Upload Image</h3>
<input type="file" id="image">

<button onclick="submitData()">Analyze</button>

<pre id="output"></pre>

// ✅ LOGIN FUNCTION
async function login() {
  const { error } = await supabaseClient.auth.signInWithPassword({
    email: document.getElementById("email").value,
    password: document.getElementById("password").value
  });

  alert(error ? error.message : "Logged in!");
}

// ✅ MAIN FUNCTION
async function submitData() {
  const file = document.getElementById("image").files[0];

  if (!file) {
    alert("Please select an image!");
    return;
  }

  // 🔼 Upload to Supabase
  const { data, error } = await supabaseClient.storage
    .from('plant-images')
    .upload(`/img_${Date.now()}.jpg`, file);

  if (error) {
    alert(error.message);
    return;
  }

  // 🔗 Get public URL
  const { data: urlData } = supabaseClient.storage
    .from('plant-images')
    .getPublicUrl(data.path);

  const imageUrl = urlData.publicUrl;
  // 🔗 send data to n8n webhook
    const res = await fetch("https://sufiyanahamed322.app.n8n.cloud/webhook-test/crop-ai", {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify({
        crop: document.getElementById("crop").value,
        age: document.getElementById("age").value,
        soil: document.getElementById("soil").value,
        image: imageUrl
    })
    });
    const text = await res.text();
    console.log(text);

    // show on screen
    const clean = text.replace(/^{"result":"|"}$/g, "");
    document.getElementById("output").innerText = clean;






}
